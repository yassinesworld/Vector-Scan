<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VECTOR-SCAN // OSINT TERMINAL</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/6.0.1/satellite.js" integrity="sha512-oA96cLyM2pla8/fgVMmZ+/31U9+VvcXirT1MI+9f1KY5bdW+TVbeg/tWy0Yt2BimCb3vZHUmVt6FsM+QkvbpLg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cesiumContainer"></div>
    
    <div id="ui-layer">
        <div class="header">
            <div class="control-panel">
            <!-- Visual Mode Row -->
            <div class="controls">
                <button onclick="setVisualMode('NORMAL')">NORMAL</button>
                <button onclick="setVisualMode('NVG')">NVG</button>
                <button onclick="setVisualMode('FLIR')">FLIR</button>
            </div>
            <!-- Cache Row (Now underneath) -->
            <div class="cache">
                <button onclick="localStorage.clear(); location.reload();">RESET CACHE & REFRESH</button>
            </div>
            </div>

            <h1>VECTOR-SCAN <span class="blink">●</span></h1>
            <p>SYSTEMS: <span class="online">ACTIVE</span></p>
        </div>
        </div>
    <script type="module" src="app.js"></script>
</body>
</html>
