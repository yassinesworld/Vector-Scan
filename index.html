<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VECTOR-SCAN // OSINT TERMINAL</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cesiumContainer"></div>
    
    <div id="ui-layer">
        <div class="header">
            <div class="controls">
                <button onclick="setVisualMode('NORMAL')">NORMAL</button>
                <button onclick="setVisualMode('NVG')">NVG</button>
                <button onclick="setVisualMode('FLIR')">FLIR</button>
            </div>
            <h1>VECTOR-SCAN <span class="blink">●</span></h1>
            <p>SYSTEMS: <span class="online">ACTIVE</span></p>
        </div>

        <div class="intel-panel">
            <div class="panel-header">OBJECT_INTEL</div>
            <div id="data-content">SCANNING FOR TARGETS...</div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
